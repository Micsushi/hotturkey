name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  build-test-lint:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install .
          pip install pytest pylint build

      - name: Run tests
        run: python -m pytest -v

      - name: Lint with pylint
        run: python -m pylint hotturkey/ --rcfile=pyproject.toml

      - name: Build package
        run: python -m build

