name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-lint:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip and install build backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: python -m build

      - name: Install built package and tools
        shell: bash
        run: |
          python -m pip install dist/*.whl
          python -m pip install pytest pylint

      - name: Run tests
        run: python -m pytest -v

      - name: Lint with pylint
        run: python -m pylint hotturkey/ --rcfile=pyproject.toml

